<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BluLounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="../scripts/vite.js"></script>
</head>
<body class="min-h-screen flex flex-col">
    <div id="app"></div>
<!-- Header -->
<header class="sticky top-0 z-50 border-b border-[#1C2A36] bg-[#0B1E2d]/95 backdrop-blur">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <!-- Top row -->
    <div class="flex h-16 items-center justify-between gap-3">
      <!-- Left: Logo -->
      <a href="/" class="flex items-center gap-2 shrink-0">
        <!-- Example logo block; replace with your SVG/image -->
        <div class="h-9 w-9 rounded-xl bg-[#D4AF37] grid place-items-center text-[#0B1E2d] font-black">BL</div>
        <span class="hidden sm:block text-white text-lg font-semibold tracking-tight">BluLounge</span>
      </a>

      <!-- Center: Search (hidden on xs, full on ≥sm) -->
      <form class="relative hidden sm:block w-full max-w-xl">
        <label for="site-search" class="sr-only">Search products</label>
        <input
          id="site-search"
          type="search"
          placeholder="Search for products…"
          class="w-full rounded-xl bg-[#0B1E2d] text-white placeholder-white/60 border border-[#1C2A36] py-2.5 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-[#D4AF37] focus:border-transparent"
        />
        <!-- icon -->
        <svg aria-hidden="true" viewBox="0 0 24 24"
             class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-white/70">
          <path fill="currentColor"
                d="M15.5 14h-.79l-.28-.27a6.471 6.471 0 0 0 1.57-4.23A6.5 6.5 0 1 0 9.5 15.5c1.61 0 3.09-.59 4.23-1.57l.27.28v.79L20 21.49 21.49 20 15.5 14Zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14Z"/>
        </svg>
      </form>

      <!-- Right: Actions -->
      <div class="flex items-center gap-2 sm:gap-3">
        <!-- Login -->
        <a href="/login"
           class="hidden sm:inline-flex items-center rounded-xl border border-[#1C2A36] px-3 py-2 text-sm font-medium text-white hover:bg-white/5 focus:outline-none focus:ring-2 focus:ring-[#D4AF37]">
          Login
        </a>

        <!-- Cart -->
        <a href="/cart" class="relative inline-flex items-center justify-center rounded-xl bg-[#D4AF37] px-3 py-2 text-sm font-semibold text-[#0B1E2d] hover:brightness-95 focus:outline-none focus:ring-2 focus:ring-[#D4AF37]">
          <svg aria-hidden="true" viewBox="0 0 24 24" class="h-5 w-5">
            <path fill="currentColor" d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2Zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2ZM7.17 14h9.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 21 5H6.21l-.94-2H2v2h2l3.6 7.59-1.35 2.44C5.52 15.37 6.48 17 8 17h12v-2H8l1.1-2h8.7l-2 3.5H7.17Z"/>
          </svg>
          <span class="ml-2 hidden sm:inline">Cart</span>
          <!-- Badge -->
          <span aria-label="items in cart"
                class="absolute -top-1 -right-1 grid h-5 w-5 place-items-center rounded-full bg-white text-[#0B1E2d] text-xs font-bold">
            3
          </span>
        </a>

        <!-- Mobile search button (shows on xs) -->
        <button type="button"
                class="sm:hidden inline-flex items-center justify-center rounded-xl border border-[#1C2A36] p-2 text-white focus:outline-none focus:ring-2 focus:ring-[#D4AF37]"
                aria-controls="mobile-search" aria-expanded="false">
          <svg aria-hidden="true" viewBox="0 0 24 24" class="h-5 w-5">
            <path fill="currentColor"
                  d="M15.5 14h-.79l-.28-.27a6.471 6.471 0 0 0 1.57-4.23A6.5 6.5 0 1 0 9.5 15.5c1.61 0 3.09-.59 4.23-1.57l.27.28v.79L20 21.49 21.49 20 15.5 14Z"/>
          </svg>
          <span class="sr-only">Open search</span>
        </button>
      </div>
    </div>

    <!-- Mobile search row -->
    <div id="mobile-search" class="pb-3 sm:hidden">
      <form class="relative">
        <label for="site-search-mobile" class="sr-only">Search products</label>
        <input
          id="site-search-mobile"
          type="search"
          placeholder="Search for products…"
          class="w-full rounded-xl bg-[#0B1E2d] text-white placeholder-white/60 border border-[#1C2A36] py-2.5 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-[#D4AF37] focus:border-transparent"
        />
        <svg aria-hidden="true" viewBox="0 0 24 24"
             class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-white/70">
          <path fill="currentColor"
                d="M15.5 14h-.79l-.28-.27a6.471 6.471 0 0 0 1.57-4.23A6.5 6.5 0 1 0 9.5 15.5c1.61 0 3.09-.59 4.23-1.57l.27.28v.79L20 21.49 21.49 20 15.5 14Z"/>
        </svg>
      </form>
    </div>
  </div>
</header>

    
<footer class="bg-gray-800 text-white py-4">
      <div class="container mx-auto text-center">
        <p>&copy; 2024, Adrian Jasaroska. Alle Rechte vorbehalten.</p>
        <ul>
          <li>
            <p>
              Kontakt
              <a
                href="mailto:adrian.jasaroska@ict.csbe.ch"
                class="hover:text-teal-400"
                >
              </a>
            </p>
          </li>
        </ul>
        <ul class="flex justify-center space-x-4 mt-4">
          <li>
            <a
              href="https://github.com/JasaroskaAdrian"
              class="hover:text-teal-400"
            >
              <div class="group relative">
                <button>
                  <svg
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    stroke-width="2"
                    stroke="currentColor"
                    fill="none"
                    viewBox="0 0 24 24"
                    class="w-8 hover:scale-125 duration-200 hover:stroke-blue-500"
                  >
                    <path
                      d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"
                    ></path>
                  </svg>
                </button>
                <span
                  class="absolute -top-14 left-[50%] -translate-x-[50%] z-20 origin-left scale-0 px-3 rounded-lg border border-gray-300 bg-white py-2 text-sm font-bold shadow-md transition-all duration-300 ease-in-out group-hover:scale-100"
                >
                  GitHub
                </span>
              </div>
            </a>
          </li>
        </ul>
      </div>
    </footer>
</body>
</html>
