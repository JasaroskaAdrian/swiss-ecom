<!doctype html>
<html lang="de" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>eSwiss – Registrieren</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { bg:'#0B1E2d', text:'#ffffff', accent:'#D4AF37' },
          boxShadow: { soft:'0 6px 24px rgba(0,0,0,0.18)' }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-bg text-text flex flex-col">
  <main class="flex-1 flex items-center justify-center px-4">
    <div class="w-full max-w-md">
      <!-- brand -->
      <a href="/home" class="mb-6 flex items-center gap-3 justify-center text-white/90">
        <img src="assets/eS-Logo.svg" alt="eS" class="h-10 w-10">
        <span class="text-xl font-semibold">eSwiss</span>
      </a>

      <!-- card -->
      <div class="rounded-2xl bg-gray-900/80 backdrop-blur border border-white/10 shadow-soft">
        <div class="p-6 sm:p-8">
          <h1 class="text-2xl font-semibold">Registrieren</h1>
          <p class="mt-1 text-sm text-white/60">Erstelle dein Konto, um zu bestellen.</p>

          <form class="mt-6 space-y-4" action="/register" method="post" novalidate>
            <!-- first/last name -->
            <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
              <div>
                <label for="first_name" class="block text-sm font-medium text-white/80">Vorname</label>
                <input id="first_name" name="first_name" type="text" required
                  class="mt-1 w-full rounded-xl bg-white/5 text-white placeholder-white/40
                         border border-white/10 px-3 py-2 outline-none
                         focus:ring-2 focus:ring-accent/60 focus:border-accent/60
                         hover:border-white/20"
                  placeholder="Adrian" />
              </div>
              <div>
                <label for="last_name" class="block text-sm font-medium text-white/80">Nachname</label>
                <input id="last_name" name="last_name" type="text" required
                  class="mt-1 w-full rounded-xl bg-white/5 text-white placeholder-white/40
                         border border-white/10 px-3 py-2 outline-none
                         focus:ring-2 focus:ring-accent/60 focus:border-accent/60
                         hover:border-white/20"
                  placeholder="Jasaroska" />
              </div>
            </div>

            <!-- email -->
            <div>
              <label for="email" class="block text-sm font-medium text-white/80">E-Mail</label>
              <input id="email" name="email" type="email" autocomplete="email" required
                class="mt-1 w-full rounded-xl bg-white/5 text-white placeholder-white/40
                       border border-white/10 px-3 py-2 outline-none
                       focus:ring-2 focus:ring-accent/60 focus:border-accent/60
                       hover:border-white/20"
                placeholder="you@example.com" />
            </div>

            <!-- password -->
            <div>
              <div class="flex items-center justify-between">
                <label for="password" class="block text-sm font-medium text-white/80">Passwort</label>
                <span class="text-xs text-white/50">min. 8 Zeichen</span>
              </div>
              <input id="password" name="password" type="password" autocomplete="new-password" required
                class="mt-1 w-full rounded-xl bg-white/5 text-white placeholder-white/40
                       border border-white/10 px-3 py-2 outline-none
                       focus:ring-2 focus:ring-accent/60 focus:border-accent/60
                       hover:border-white/20"
                placeholder="••••••••" />
            </div>

            <!-- confirm password -->
            <div>
              <label for="password_confirm" class="block text-sm font-medium text-white/80">Passwort bestätigen</label>
              <input id="password_confirm" name="password_confirm" type="password" autocomplete="new-password" required
                class="mt-1 w-full rounded-xl bg-white/5 text-white placeholder-white/40
                       border border-white/10 px-3 py-2 outline-none
                       focus:ring-2 focus:ring-accent/60 focus:border-accent/60
                       hover:border-white/20"
                placeholder="••••••••" />
            </div>

            <!-- terms -->
            <label class="mt-2 inline-flex items-start gap-2 text-sm">
              <input type="checkbox" name="terms" required
                class="mt-0.5 h-4 w-4 rounded border-white/20 bg-white/5 text-accent
                       focus:ring-2 focus:ring-accent/60" />
              <span>Ich akzeptiere die <a href="/agb" class="underline hover:text-accent">AGB</a> und die <a href="/datenschutz" class="underline hover:text-accent">Datenschutzerklärung</a>.</span>
            </label>

            <!-- submit -->
            <button type="submit"
              class="mt-2 w-full rounded-xl bg-accent px-4 py-2.5 font-semibold text-black
                     hover:opacity-95 focus:outline-none focus:ring-2 focus:ring-offset-2
                     focus:ring-accent/70 focus:ring-offset-gray-900">
              Konto erstellen
            </button>
          </form>

          <p class="mt-4 text-sm text-white/70">
            Schon ein Konto?
            <a href="/login" class="font-semibold text-white hover:text-accent">Anmelden</a>
          </p>
        </div>
      </div>

      <p class="mt-6 text-center text-xs text-white/50">© 2025 eSwiss</p>
    </div>
  </main>

  <!-- optional: your site footer here -->
</body>
</html>
