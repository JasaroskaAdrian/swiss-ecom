<!doctype html>
<html lang="de" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>eSwiss – Sign in</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { bg:'#0B1E2d', text:'#ffffff', accent:'#D4AF37' },
          boxShadow: { soft:'0 6px 24px rgba(0,0,0,0.18)' }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-bg text-text flex items-center justify-center px-4">
  <main class="w-full max-w-md">
    <!-- brand -->
    <a href="/home" class="mb-6 flex items-center gap-3 justify-center text-white/90">
      <span class="inline-flex h-9 w-9 items-center justify-center rounded-full bg-accent font-bold text-black">eS</span>
      <span class="text-xl font-semibold">eSwiss</span>
    </a>

    <!-- card -->
    <div class="rounded-2xl bg-gray-900/80 backdrop-blur border border-white/10 shadow-soft">
      <div class="p-6 sm:p-8">
        <h1 class="text-2xl font-semibold">Anmelden</h1>
        <p class="mt-1 text-sm text-white/60">Willkommen zurück.</p>

        <form class="mt-6 space-y-4" action="/login" method="post" novalidate>
          <!-- email -->
          <div>
            <label for="email" class="block text-sm font-medium text-white/80">E-Mail</label>
            <input
              id="email" name="email" type="email" autocomplete="email" required
              class="mt-1 w-full rounded-xl bg-white/5 text-white placeholder-white/40
                     border border-white/10 px-3 py-2 outline-none
                     focus:ring-2 focus:ring-accent/60 focus:border-accent/60
                     hover:border-white/20"
              placeholder="you@example.com" />
          </div>

          <!-- password -->
          <div>
            <label for="password" class="block text-sm font-medium text-white/80">Passwort</label>
            <input
              id="password" name="password" type="password" autocomplete="current-password" required
              class="mt-1 w-full rounded-xl bg-white/5 text-white placeholder-white/40
                     border border-white/10 px-3 py-2 outline-none
                     focus:ring-2 focus:ring-accent/60 focus:border-accent/60
                     hover:border-white/20"
              placeholder="••••••••" />
          </div>

          <!-- submit -->
          <button
            type="submit"
            class="w-full rounded-xl bg-accent px-4 py-2.5 font-semibold text-black
                   hover:opacity-95 focus:outline-none focus:ring-2 focus:ring-offset-2
                   focus:ring-accent/70 focus:ring-offset-gray-900">
            <a href="/home"></a>
            Anmelden
          </button>
        </form>

        <p class="mt-4 text-sm text-white/70">
          Noch kein Konto?
          <a href="/register" class="font-semibold text-white hover:text-accent">Registrieren</a>
        </p>
      </div>
    </div>

    <!-- footer link (optional slim) -->
    <p class="mt-6 text-center text-xs text-white/50">
      © 2025 eSwiss
    </p>
  </main>
</body>
</html>
