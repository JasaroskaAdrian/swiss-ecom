<!doctype html>
<html lang="de" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>eSwiss</title>
  <!-- Tailwind CDN for quick use -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { bg: '#0B1E2d', text: '#ffffff', accent: '#D4AF37' },
          boxShadow: { soft: '0 6px 24px rgba(0,0,0,0.18)' },
          maxWidth: { content: '1200px' }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-bg text-text flex flex-col">
  <div class="mx-auto max-w-content px-4 sm:px-6 lg:px-8 flex-1">

    <!-- Header (unchanged) -->
    <header class="py-4">
      <div class="flex items-center gap-4">
        <a href="/" class="flex items-center gap-2 font-semibold tracking-wide">
          <img src="assets/eS-Logo.svg" alt="eS" class="h-10 w-10">
          <span class="text-xl">eSwiss</span>
        </a>

        <form class="ml-auto hidden w-full max-w-xl items-center gap-2 rounded-xl border border-white/10 bg-white/5 px-3 py-2 shadow-soft backdrop-blur sm:flex">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 text-white/60" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M12.9 14.32a8 8 0 1 1 1.414-1.414l3.387 3.386a1 1 0 0 1-1.414 1.415l-3.387-3.387ZM14 8a6 6 0 1 1-12 0 6 6 0 0 1 12 0Z" clip-rule="evenodd"/>
          </svg>
          <input aria-label="Suche" type="search" placeholder="Produkte suchen"
                 class="w-full bg-transparent placeholder-white/50 outline-none" />
        </form>

        <nav class="ml-2 flex items-center gap-2">
          <a href="/login" class="rounded-xl bg-white/10 px-4 py-2 text-sm hover:bg-white/15">Login</a>
          <a href="/cart" class="relative rounded-xl bg-accent px-4 py-2 text-sm font-semibold text-black hover:opacity-95">
            Warenkorb
            <span class="absolute -right-2 -top-2 inline-flex h-5 min-w-[1.25rem] items-center justify-center rounded-full bg-white px-1 text-xs font-bold text-black">3</span>
          </a>
        </nav>
      </div>

      <form class="mt-3 flex w-full items-center gap-2 rounded-xl border border-white/10 bg-white/5 px-3 py-2 shadow-soft backdrop-blur sm:hidden">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 text-white/60" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M12.9 14.32a8 8 0 1 1 1.414-1.414l3.387 3.386a1 1 0 0 1-1.414 1.415l-3.387-3.387ZM14 8a6 6 0 1 1-12 0 6 6 0 0 1 12 0Z" clip-rule="evenodd"/>
        </svg>
        <input aria-label="Suche" type="search" placeholder="Produkte suchen"
               class="w-full bg-transparent placeholder-white/50 outline-none" />
      </form>
    </header>

    <!-- Hero -->
    <section class="mt-6 overflow-hidden rounded-2xl bg-gradient-to-r from-white/5 to-white/0 p-8 ring-1 ring-white/10">
      <div class="flex flex-col items-start gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <h1 class="text-3xl font-semibold leading-tight">Qualität, auf Schweizer Niveau.</h1>
          <p class="mt-2 text-white/70">Faire Preise. Verlässliche Lieferung. Kein Schnickschnack.</p>
        </div>
        <a href="#products" class="rounded-xl bg-accent px-5 py-3 font-semibold text-black shadow-soft hover:opacity-95">Jetzt shoppen</a>
      </div>
    </section>

    <!-- Products grid (placeholder) -->
    <main id="products" class="mt-6">
      <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
        <!-- … product cards … -->
        <article class="overflow-hidden rounded-2xl border border-white/10 bg-white/5 shadow-soft">
          <div class="aspect-[4/3] w-full bg-white/10"></div>
          <div class="p-4">
            <h3 class="text-sm/6 font-medium">Alpine Softshell Jacket</h3>
            <p class="mt-1 text-white/60 text-sm">Auf Lager</p>
            <div class="mt-3 flex items-center justify-between">
              <span class="text-lg font-semibold">CHF 149.–</span>
              <button class="rounded-lg bg-accent px-3 py-1.5 text-sm font-semibold text-black hover:opacity-95">Hinzufügen</button>
            </div>
          </div>
        </article>
        <!-- duplicate as needed -->
      </div>
    </main>

  </div>

  <!-- YOUR FOOTER -->
  <footer class="bg-gray-800 text-white py-4 mt-12">
    <div class="container mx-auto text-center px-4">
      <p>&copy; 2024, Adrian Jasaroska. Alle Rechte vorbehalten.</p>

      <ul class="mt-2">
        <li>
          <p>
            Kontakt
            <a href="mailto:adrian.jasaroska@ict.csbe.ch" class="hover:text-teal-400 underline underline-offset-4">
              adrian.jasaroska@ict.csbe.ch
            </a>
          </p>
        </li>
      </ul>

      <ul class="flex justify-center space-x-4 mt-4">
        <li>
          <a href="https://github.com/JasaroskaAdrian" class="hover:text-teal-400 group relative inline-flex items-center justify-center" aria-label="GitHub">
            <svg stroke-linejoin="round" stroke-linecap="round" stroke-width="2"
                 stroke="currentColor" fill="none" viewBox="0 0 24 24"
                 class="w-8 transition-transform duration-200 group-hover:scale-125 group-hover:stroke-blue-500">
              <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
            </svg>
            <span class="absolute -top-14 left-1/2 -translate-x-1/2 z-20 origin-left scale-0 px-3 rounded-lg border border-gray-300 bg-white py-2 text-sm font-bold text-gray-900 shadow-md transition-all duration-300 ease-in-out group-hover:scale-100">
              GitHub
            </span>
          </a>
        </li>
      </ul>
    </div>
  </footer>
</body>
</html>
