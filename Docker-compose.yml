services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=${POSTGRES_PASS}
      - POSTGRES_DB=shop
    ports:
      - "15432:5432"
    volumes:
      - dbDataSave:/var/lib/postgresql/data
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
  wiki:
    image: requarks/wiki:canary-2.5.0-dev.409
    restart: unless-stopped
    ports:
      - "8040:8040"
    environment:
      - DB_TYPE=postgres
      - DB_HOST=admin
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASS_FILE=./.env
      - DB_NAME=shop
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
  grafana:
    image: grafana/grafana
    ports:
      - "3010:3000"
    volumes:
      - ./grafana:/etc/grafana/provisioning/datasources
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=supersecret123
volumes:
  dbDataSave:
