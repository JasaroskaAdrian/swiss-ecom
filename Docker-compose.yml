services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
      POSTGRES_DB: shop
    ports:
      - "15432:5432"
    volumes:
      - dbDataSave:/var/lib/postgresql/data
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  dbDataSave:
